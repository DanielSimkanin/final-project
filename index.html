<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Harrisburg Hawks - Capital City Flag Athletics">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
      font-family: var(--ddd-font-navigation);
      color-scheme: light dark;
      background-color: #f4f4f4;
      color: var(--ddd-theme-default-navy, #001e44);
    }

    @media (prefers-color-scheme: dark) {
      :root, html, body {
        background-color: #081426;
        color: var(--ddd-theme-default-white, #ffffff);
      }
      :root {
        --ddd-theme-default-white: #ffffff;
        --ddd-theme-default-navy: #001e44;
        --ddd-theme-default-keystoneYellow: #e2c044;
        --ddd-theme-default-coalyGray: #3a3a3a;
        --ddd-theme-default-lightGray: #f4f4f4;
        --ddd-theme-default-nittanyNavy: #081426;
      }
    }

    /* Hawks brand tokens */
    :root {
      --hawks-navy: var(--ddd-theme-default-navy, #001e44);
      --hawks-gold: var(--ddd-theme-default-keystoneYellow, #e2c044);
      --hawks-white: var(--ddd-theme-default-white, #ffffff);
      --hawks-gray: var(--ddd-theme-default-coalyGray, #3a3a3a);
    }
  </style>
  <title>Harrisburg Hawks</title>
</head>

<body>

  <hawks-header site-name="Harrisburg Hawks"></hawks-header>

  <div id="app-content"></div>

  <hawks-footer title="Harrisburg Hawks"></hawks-footer>

  <script type="module" src="./hawks-header.js"></script>
  <script type="module" src="./hawks-banner.js"></script>
  <script type="module" src="./hawks-stat-counter.js"></script>
  <script type="module" src="./hawks-schedule.js"></script>
  <script type="module" src="./hawks-news-card.js"></script>
  <script type="module" src="./hawks-link-card.js"></script>
  <script type="module" src="./hawks-team-card.js"></script>
  <script type="module" src="./hawks-content-page.js"></script>
  <script type="module" src="./hawks-logo-strip.js"></script>
  <script type="module" src="./hawks-footer.js"></script>

  <script type="module">
    function getPage() {
      const path = window.location.pathname;
      if (path === '/schedule') return 'schedule';
      if (path === '/team') return 'team';
      if (path === '/news') return 'news';
      if (path === '/about') return 'about';
      return 'home';
    }

    function renderPage() {
      const page = getPage();
      const app = document.getElementById('app-content');

      if (page === 'home') {
        app.innerHTML = `
          <hawks-banner></hawks-banner>
          <hawks-stat-counter></hawks-stat-counter>
          <hawks-schedule></hawks-schedule>
          <hawks-news-card></hawks-news-card>
          <hawks-link-card></hawks-link-card>
          <hawks-team-card></hawks-team-card>
          <hawks-content-page></hawks-content-page>
          <hawks-logo-strip></hawks-logo-strip>
        `;
      } else if (page === 'schedule') {
        app.innerHTML = `
          <hawks-schedule></hawks-schedule>
        `;
      } else if (page === 'team') {
        app.innerHTML = `
          <hawks-team-card></hawks-team-card>
        `;
      } else if (page === 'news') {
        app.innerHTML = `
          <hawks-news-card></hawks-news-card>
        `;
      } else if (page === 'about') {
        app.innerHTML = `
          <hawks-content-page></hawks-content-page>
          <hawks-logo-strip></hawks-logo-strip>
        `;
      }
    }

    // Handle nav clicks without full page reload
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (href && href.startsWith('/') && !href.startsWith('//')) {
        e.preventDefault();
        window.history.pushState({}, '', href);
        renderPage();
      }
    });

    // Handle browser back/forward
    window.addEventListener('popstate', renderPage);

    // Initial render
    renderPage();
  </script>

</body>
